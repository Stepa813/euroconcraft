<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EuroConCraft — Натяжные потолки</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&family=Playfair+Display:ital,wght@0,700;1,400&family=Sarabun:wght@300;400;600;700&display=swap');

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --deep:#0B0F1A;--pearl:#F0EFEA;--gold:#C9A96E;--gold-lt:#E8C98A;
  --muted:#4A506A;--card:rgba(255,255,255,.035);--border:rgba(201,169,110,.18);
}
html{font-size:16px;}
body{
  background:var(--deep);font-family:'Montserrat',sans-serif;
  color:var(--pearl);overflow:hidden;
  height:100dvh;height:100vh;width:100vw;touch-action:pan-y;
}
body.th{font-family:'Sarabun',sans-serif;}

/* ═══ LOGO BAR ═══ */
#logo-bar{
  position:fixed;top:0;left:0;right:0;height:52px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;
  background:rgba(11,15,26,.88);backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(201,169,110,.12);z-index:200;
}
.logo{font-size:15px;font-weight:700;letter-spacing:.5px;color:var(--pearl);}
.logo span{color:var(--gold);}

/* right side of bar */
.bar-right{display:flex;align-items:center;gap:12px;}
#counter{font-size:10px;letter-spacing:2px;color:var(--muted);}

/* ─── LANG TOGGLE ─── */
#lang-toggle{
  display:flex;align-items:center;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);
  border-radius:20px;overflow:hidden;
  height:26px;
}
.lang-btn{
  padding:0 10px;height:100%;
  font-size:10px;font-weight:700;letter-spacing:1px;
  background:transparent;border:none;color:var(--muted);
  cursor:pointer;transition:all .25s;
  font-family:'Montserrat',sans-serif;
  -webkit-tap-highlight-color:transparent;
}
.lang-btn.active{
  background:var(--gold);color:#0B0F1A;border-radius:18px;
}

/* ═══ PROGRESS ═══ */
#progress{position:fixed;top:52px;left:0;height:2px;background:var(--gold);width:0%;z-index:200;transition:width linear;}

/* ═══ DOTS ═══ */
#dots{position:fixed;bottom:54px;left:50%;transform:translateX(-50%);display:flex;gap:7px;align-items:center;z-index:200;}
.dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.25);cursor:pointer;transition:all .3s;}
.dot.active{width:18px;border-radius:3px;background:var(--gold);}

/* ═══ CONTROLS ═══ */
#controls{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:200;}
.ctrl-btn{
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
  color:var(--pearl);padding:5px 14px;border-radius:20px;
  font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:1.2px;
  cursor:pointer;transition:background .2s;white-space:nowrap;
  -webkit-tap-highlight-color:transparent;
}
.ctrl-btn:active{background:rgba(201,169,110,.2);}
#autoBtn.paused{color:var(--gold);border-color:var(--gold);}

/* ═══ SLIDESHOW ═══ */
#slideshow{position:relative;width:100%;height:100vh;}

/* ═══ SLIDE BASE ═══ */
.slide{
  position:absolute;inset:0;top:52px;
  padding:20px 20px 100px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  overflow:hidden;opacity:0;pointer-events:none;transition:opacity .5s ease;
}
.slide.active{opacity:1;pointer-events:auto;}
.wave{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--gold),#fff9,var(--gold),transparent);transform:scaleX(0);transform-origin:left;}
.slide.active .wave{animation:waveIn .9s cubic-bezier(.4,0,.2,1) forwards;}
@keyframes waveIn{0%{transform:scaleX(0);opacity:.5;}60%{transform:scaleX(1.04);opacity:1;}100%{transform:scaleX(1);opacity:1;}}
.slide::after{content:'';position:absolute;inset:0;background:var(--deep);pointer-events:none;opacity:1;transition:opacity .55s ease;}
.slide.active::after{opacity:0;}

/* animations */
@keyframes fadeUp{to{opacity:1;transform:translateY(0);}}
@keyframes popIn {to{opacity:1;transform:scale(1);}}
@keyframes growW {to{width:var(--target-w,200px);}}
.slide.active .au1{animation:fadeUp .6s .2s  forwards;}
.slide.active .au2{animation:fadeUp .6s .35s forwards;}
.slide.active .au3{animation:fadeUp .6s .5s  forwards;}
.slide.active .au4{animation:fadeUp .6s .65s forwards;}
.slide.active .au5{animation:fadeUp .6s .8s  forwards;}
.slide.active .au6{animation:fadeUp .6s .95s forwards;}
.slide.active .au7{animation:fadeUp .6s 1.1s forwards;}
.slide.active .pop1{animation:popIn .7s .25s cubic-bezier(.34,1.56,.64,1) forwards;}
.pre-anim{opacity:0;transform:translateY(22px);}
.pre-pop {opacity:0;transform:scale(.7);}
.eyebrow{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:14px;}
.g-line{height:1px;width:0;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:18px auto 0;}
.slide.active .g-line{animation:growW .9s 1s forwards;--target-w:200px;}

/* SLIDE 0 */
#s0{background:var(--deep);text-align:center;}
#s0 .bg-photo{
  position:absolute;inset:0;
  background:url('https://source.unsplash.com/photo-1600607687939-ce8a6c25118c/1400x900') center/cover no-repeat;
  opacity:.35; z-index:0;
}
#s0 .bg-glow{position:absolute;width:70vw;height:70vw;max-width:420px;max-height:420px;border-radius:50%;background:radial-gradient(circle,rgba(42,53,96,.55) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);z-index:1;}
#s0>*:not(.bg-photo):not(.bg-glow){position:relative;z-index:2;}
#s0 h1{font-family:'Playfair Display',serif;font-size:clamp(36px,9vw,80px);line-height:1.08;font-weight:700;margin-bottom:6px;}
#s0 h1 em{font-style:italic;color:var(--gold);}
#s0 .sub{font-size:clamp(12px,3.2vw,16px);font-weight:300;color:rgba(240,239,234,.55);max-width:340px;line-height:1.65;margin-top:12px;}

/* SLIDE 1 */
#s1{background:linear-gradient(135deg,#0B0F1A 55%,#131B35 100%);text-align:center;}
#s1 .num{font-family:'Playfair Display',serif;font-size:clamp(72px,20vw,140px);color:var(--gold);line-height:1;}
#s1 .lbl{font-size:clamp(10px,3vw,15px);font-weight:300;letter-spacing:2.5px;color:rgba(240,239,234,.55);margin-top:4px;}
#s1 h2{font-size:clamp(18px,5vw,34px);font-weight:700;margin-top:18px;max-width:480px;}
#s1 p{font-size:clamp(12px,3.2vw,15px);font-weight:300;color:rgba(240,239,234,.5);max-width:400px;line-height:1.7;margin-top:12px;}

/* SLIDE 2 */
#s2{background:var(--deep);justify-content:flex-start;align-items:stretch;padding-top:24px;padding-bottom:100px;overflow-y:auto;}
#s2 h2{font-size:clamp(16px,4.5vw,28px);font-weight:700;margin-bottom:18px;text-align:center;flex-shrink:0;}
.cmp-wrap{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;}
table.cmp{width:100%;min-width:340px;border-collapse:collapse;font-size:clamp(10px,2.8vw,13px);}
table.cmp thead th{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;padding:6px 10px 12px;text-align:center;}
.th-us{color:var(--gold-lt);}
table.cmp tbody tr{border-top:1px solid rgba(255,255,255,.06);opacity:0;transform:translateX(-16px);}
#s2.active table.cmp tbody tr:nth-child(1){animation:slideR .45s .45s forwards;}
#s2.active table.cmp tbody tr:nth-child(2){animation:slideR .45s .58s forwards;}
#s2.active table.cmp tbody tr:nth-child(3){animation:slideR .45s .71s forwards;}
#s2.active table.cmp tbody tr:nth-child(4){animation:slideR .45s .84s forwards;}
#s2.active table.cmp tbody tr:nth-child(5){animation:slideR .45s .97s forwards;}
#s2.active table.cmp tbody tr:nth-child(6){animation:slideR .45s 1.1s forwards;}
#s2.active table.cmp tbody tr:nth-child(7){animation:slideR .45s 1.23s forwards;}
@keyframes slideR{to{opacity:1;transform:translateX(0);}}
table.cmp td{padding:8px 10px;text-align:center;}
table.cmp td:first-child{text-align:left;font-weight:500;color:rgba(240,239,234,.7);white-space:nowrap;}
.td-us{font-weight:600;color:var(--gold-lt);}
.ic-y{color:#6FD08C;font-size:16px;}.ic-n{color:#E06C75;font-size:16px;}.ic-p{color:#E5C07B;font-size:13px;}

/* SLIDE 3 */
#s3{background:linear-gradient(155deg,#0d1220,#0B0F1A);text-align:center;}
#s3 h2{font-size:clamp(16px,4.5vw,28px);font-weight:700;margin-bottom:18px;}
.adv-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:700px;}
@media(max-width:480px){.adv-grid{grid-template-columns:repeat(2,1fr);}}
.adv-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 12px;text-align:left;transition:border-color .3s;}
.adv-card:active{border-color:rgba(201,169,110,.5);}
.adv-icon{font-size:22px;margin-bottom:8px;}
.adv-title{font-size:clamp(10px,2.6vw,12px);font-weight:700;color:var(--gold-lt);margin-bottom:5px;}
.adv-desc{font-size:clamp(9px,2.3vw,11px);font-weight:300;color:rgba(240,239,234,.5);line-height:1.55;}

/* SLIDE 4 */
#s4{background:var(--deep);text-align:center;}
#s4 h2{font-size:clamp(16px,4.5vw,28px);font-weight:700;margin-bottom:18px;}
.types-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:700px;}
@media(max-width:440px){.types-grid{grid-template-columns:1fr;max-width:340px;}}
.type-card{border-radius:10px;padding:18px 14px;text-align:left;position:relative;overflow:hidden;background:linear-gradient(135deg,#1a1f35,#232a48);}
.type-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;z-index:2;}
.type-card .tc-photo{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.28;z-index:0;}
.type-card>*:not(.tc-photo){position:relative;z-index:1;}
.tc-gloss::before{background:linear-gradient(90deg,#7EB8F7,#B3D4FF);}
.tc-matte::before{background:linear-gradient(90deg,#A0A0B0,#D0D0D8);}
.tc-satin::before{background:linear-gradient(90deg,var(--gold),var(--gold-lt));}
.tc-gloss .tc-photo{background-image:url('https://source.unsplash.com/photo-1600607687939-ce8a6c25118c/600x400');}
.tc-matte .tc-photo{background-image:url('https://source.unsplash.com/photo-1615529328331-f8917597711f/600x400');}
.tc-satin .tc-photo{background-image:url('https://source.unsplash.com/photo-1631679706909-1844bbd07221/600x400');}

/* SLIDE 6 installation — photo bg */
#s6{background:var(--deep);text-align:center;position:relative;}
#s6 .bg-photo{
  position:absolute;inset:0;
  background:url('https://source.unsplash.com/photo-1504307651254-35680f356dfd/1200x800') center/cover no-repeat;
  opacity:.25; z-index:0;
}
#s6>*:not(.bg-photo){position:relative;z-index:1;}

/* SLIDE 9 CTA — photo bg */
#s9{background:linear-gradient(135deg,#0B0F1A,#0f1828);text-align:center;position:relative;}
#s9 .bg-photo{
  position:absolute;inset:0;
  background:url('https://source.unsplash.com/photo-1560185127-6ed189bf02f4/1400x900') center/cover no-repeat;
  opacity:.28; z-index:0;
}
#s9>*:not(.bg-photo){position:relative;z-index:1;}
.type-name{font-size:clamp(13px,3.5vw,16px);font-weight:700;margin-bottom:5px;}
.type-tag{display:inline-block;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;padding:2px 7px;border-radius:3px;margin-bottom:10px;}
.tag-g{background:rgba(126,184,247,.15);color:#7EB8F7;}
.tag-m{background:rgba(200,200,210,.15);color:#C8C8D2;}
.tag-s{background:rgba(201,169,110,.2);color:var(--gold-lt);}
.type-desc{font-size:clamp(9px,2.5vw,11px);font-weight:300;color:rgba(240,239,234,.5);line-height:1.55;}
.type-feats{margin-top:10px;}
.type-feat{font-size:clamp(9px,2.3vw,10px);color:rgba(240,239,234,.6);margin-bottom:4px;}
.type-feat::before{content:'— ';color:var(--gold);}

/* SLIDE 5 */
#s5{background:linear-gradient(135deg,#0B0F1A,#101830);text-align:center;}
#s5 h2{font-size:clamp(15px,4.2vw,26px);font-weight:700;margin-bottom:24px;max-width:420px;}
.bars{width:100%;max-width:560px;}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;opacity:0;transform:translateY(14px);}
.bar-name{width:130px;min-width:130px;text-align:right;font-size:clamp(10px,2.8vw,12px);font-weight:400;color:rgba(240,239,234,.65);}
@media(max-width:380px){.bar-name{width:100px;min-width:100px;font-size:10px;}}
.bar-track{flex:1;height:7px;background:rgba(255,255,255,.07);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;width:0;}
.bar-val{width:62px;font-size:clamp(9px,2.4vw,11px);font-weight:600;color:rgba(240,239,234,.75);white-space:nowrap;}
#s5.active .bar-row:nth-child(1){animation:fadeUp .4s .5s  forwards;}
#s5.active .bar-row:nth-child(2){animation:fadeUp .4s .65s forwards;}
#s5.active .bar-row:nth-child(3){animation:fadeUp .4s .8s  forwards;}
#s5.active .bar-row:nth-child(4){animation:fadeUp .4s .95s forwards;}
#s5.active .bar-row:nth-child(5){animation:fadeUp .4s 1.1s forwards;}
#s5.active .bf1{transition:width 1.2s .7s  cubic-bezier(.4,0,.2,1);width:92%!important;background:linear-gradient(90deg,var(--gold),var(--gold-lt));}
#s5.active .bf2{transition:width 1.2s .85s cubic-bezier(.4,0,.2,1);width:42%!important;background:#5A6080;}
#s5.active .bf3{transition:width 1.2s 1s   cubic-bezier(.4,0,.2,1);width:28%!important;background:#5A6080;}
#s5.active .bf4{transition:width 1.2s 1.15s cubic-bezier(.4,0,.2,1);width:32%!important;background:#5A6080;}
#s5.active .bf5{transition:width 1.2s 1.3s  cubic-bezier(.4,0,.2,1);width:20%!important;background:#5A6080;}
.bar-note{font-size:10px;font-weight:300;color:rgba(240,239,234,.35);margin-top:16px;max-width:440px;}

/* SLIDE 6 */
#s6{background:var(--deep);text-align:center;}
#s6 h2{font-size:clamp(16px,4.5vw,28px);font-weight:700;margin-bottom:22px;}
.steps{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;width:100%;max-width:600px;}
@media(min-width:600px){.steps{grid-template-columns:repeat(4,1fr);}}
.step{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 12px;text-align:center;}
.step-n{width:38px;height:38px;border-radius:50%;background:rgba(201,169,110,.1);border:1px solid rgba(201,169,110,.35);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:16px;color:var(--gold);margin:0 auto 10px;}
.step-t{font-size:clamp(11px,3vw,13px);font-weight:700;margin-bottom:6px;}
.step-d{font-size:clamp(9px,2.4vw,11px);font-weight:300;color:rgba(240,239,234,.5);line-height:1.55;}
.inst-fact{margin-top:14px;padding:14px 20px;border:1px solid rgba(201,169,110,.2);border-radius:8px;font-size:clamp(11px,3vw,13px);font-weight:300;color:rgba(240,239,234,.7);max-width:500px;line-height:1.6;}
.inst-fact b{color:var(--gold);font-weight:700;}

/* ═══ PROBLEM SLIDES (7b–7g) ═══ */
.prob-slide{
  display:flex;flex-direction:column;align-items:center;
  width:100%;max-width:720px;gap:12px;
}
.prob-badge{
  font-size:clamp(10px,2.8vw,13px);font-weight:700;
  padding:5px 18px;border-radius:20px;letter-spacing:.5px;
  margin-bottom:2px;
}
.gkl-badge{background:rgba(224,108,117,.12);border:1px solid rgba(224,108,117,.35);color:#E06C75;}
.prob-vs-wrap{
  display:grid;grid-template-columns:1fr auto 1fr;
  gap:8px;width:100%;align-items:start;
}
.prob-side{
  background:var(--card);border-radius:10px;
  padding:12px 10px;display:flex;flex-direction:column;align-items:center;gap:8px;
}
.prob-bad{border:1px solid rgba(224,108,117,.2);}
.prob-good{border:1px solid rgba(201,169,110,.2);}
.prob-icon-wrap{flex-shrink:0;}
.prob-label{font-size:clamp(10px,2.8vw,12px);font-weight:700;text-align:center;}
.bad-label{color:#E06C75;} .good-label{color:var(--gold-lt);}
.prob-list{
  list-style:none;padding:0;margin:0;
  font-size:clamp(9px,2.4vw,11px);font-weight:300;
  color:rgba(240,239,234,.65);line-height:1.55;
  text-align:left;width:100%;
}
.bad-list li::before{content:'✗ ';color:#E06C75;}
.good-list li::before{content:'✓ ';color:#6FD08C;}
.prob-list li{margin-bottom:5px;}
.prob-divider{
  display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;
  font-size:clamp(14px,4vw,22px);color:var(--muted);font-weight:700;
  padding-top:50px;
}
.prob-fact{
  width:100%;padding:10px 16px;
  border:1px solid rgba(201,169,110,.2);border-radius:8px;
  font-size:clamp(10px,2.6vw,12px);font-weight:300;
  color:rgba(240,239,234,.65);line-height:1.6;text-align:center;
  background:rgba(201,169,110,.04);
}
.prob-fact b{color:var(--gold);font-weight:700;}

/* SLIDE 7 — DUEL */
#s7{background:var(--deep);text-align:center;}
#s7 h2{font-size:clamp(15px,4.2vw,26px);font-weight:700;margin-bottom:20px;}
.duel-wrap{display:grid;grid-template-columns:1fr auto 1fr;gap:0;width:100%;max-width:720px;align-items:stretch;}
.duel-col{display:flex;flex-direction:column;gap:8px;padding:0 8px;}
.duel-col-gkl .duel-header{background:rgba(224,108,117,.12);border:1px solid rgba(224,108,117,.25);color:#E06C75;}
.duel-col-nat .duel-header{background:rgba(201,169,110,.12);border:1px solid rgba(201,169,110,.35);color:var(--gold-lt);}
.duel-header{border-radius:8px;padding:10px 14px;font-size:clamp(11px,3vw,13px);font-weight:700;letter-spacing:.3px;text-align:center;margin-bottom:4px;}
.duel-item{border-radius:7px;padding:9px 12px;font-size:clamp(9px,2.4vw,11px);line-height:1.5;text-align:left;}
.duel-col-gkl .duel-item{background:rgba(224,108,117,.06);border:1px solid rgba(224,108,117,.12);color:rgba(240,239,234,.65);}
.duel-col-nat .duel-item{background:rgba(201,169,110,.06);border:1px solid rgba(201,169,110,.15);color:rgba(240,239,234,.8);}
.duel-item .duel-icon{font-size:13px;margin-right:5px;}
.duel-icon-svg{width:16px;height:16px;margin-right:5px;vertical-align:-3px;flex-shrink:0;display:inline-block;}
.duel-item.has-svg{display:flex;align-items:flex-start;}
.duel-item.has-svg>span:last-child{flex:1;}

/* termite warning banner */
.termite-banner{
  margin-top:14px;width:100%;max-width:720px;
  display:flex;align-items:center;gap:14px;
  background:rgba(224,108,117,.08);
  border:1px solid rgba(224,108,117,.3);
  border-radius:10px;padding:12px 16px;
  opacity:0;transform:translateY(16px);
}
#s7.active .termite-banner{animation:fadeUp .6s 1.1s forwards;}
.termite-svg-wrap{flex-shrink:0;width:64px;height:44px;}
.termite-svg-wrap svg{width:100%;height:100%;overflow:visible;}
.termite-text{text-align:left;}
.termite-title{font-size:clamp(11px,3vw,13px);font-weight:700;color:#E06C75;margin-bottom:3px;}
.termite-desc{font-size:clamp(9px,2.4vw,11px);font-weight:300;color:rgba(240,239,234,.6);line-height:1.5;}
/* termite walking animation */
@keyframes termiteWiggle{0%,100%{transform:rotate(-2deg);}50%{transform:rotate(2deg);}}
@keyframes antennaWiggle{0%,100%{transform:rotate(0deg);}50%{transform:rotate(-8deg);}}
.tm-body{transform-origin:center;animation:termiteWiggle 1.2s ease-in-out infinite;}
.tm-antenna{transform-origin:left center;animation:antennaWiggle .8s ease-in-out infinite;}
.tm-leg{transform-origin:top;animation:antennaWiggle .5s ease-in-out infinite;}
.duel-divider{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:0 4px;}
.duel-vs{font-family:'Playfair Display',serif;font-size:clamp(18px,5vw,28px);color:var(--muted);font-weight:700;line-height:1;}
.duel-tick{width:1px;flex:1;background:rgba(255,255,255,.07);}
@media(max-width:420px){
  .duel-wrap{grid-template-columns:1fr auto 1fr;}
  .duel-item{padding:7px 8px;}
}

/* SLIDE 8 — COST CHART */
#s8{background:linear-gradient(155deg,#0B0F1A,#0e1525);text-align:center;}
#s8 h2{font-size:clamp(15px,4.2vw,26px);font-weight:700;margin-bottom:6px;}
#s8 .chart-sub{font-size:clamp(10px,2.6vw,12px);font-weight:300;color:rgba(240,239,234,.4);margin-bottom:18px;}
.cost-chart{width:100%;max-width:620px;position:relative;}
.chart-svg-wrap{width:100%;aspect-ratio:16/7;position:relative;}
svg.cost-svg{width:100%;height:100%;}
.cost-legend{display:flex;gap:18px;justify-content:center;margin-top:14px;flex-wrap:wrap;}
.leg-item{display:flex;align-items:center;gap:6px;font-size:clamp(9px,2.4vw,11px);color:rgba(240,239,234,.6);}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.cost-callout{margin-top:14px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.callout-pill{padding:6px 14px;border-radius:20px;font-size:clamp(9px,2.4vw,11px);font-weight:600;background:rgba(201,169,110,.1);border:1px solid rgba(201,169,110,.25);color:var(--gold-lt);}

/* SLIDE 9 (old 7) */
#s9{background:linear-gradient(135deg,#0B0F1A,#0f1828);text-align:center;}
#s9 .glow{position:absolute;width:60vw;height:60vw;max-width:380px;max-height:380px;border-radius:50%;background:radial-gradient(circle,rgba(201,169,110,.07) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;}
#s9 h2{font-family:'Playfair Display',serif;font-size:clamp(26px,7.5vw,56px);font-weight:700;line-height:1.15;max-width:520px;}
#s9 h2 em{font-style:italic;color:var(--gold);}
#s9 .cta-sub{font-size:clamp(12px,3.2vw,15px);font-weight:300;color:rgba(240,239,234,.5);max-width:400px;line-height:1.7;margin-top:14px;}
.badges{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:22px;}
.badge{padding:7px 16px;border:1px solid rgba(201,169,110,.3);border-radius:20px;font-size:clamp(9px,2.5vw,11px);font-weight:600;color:var(--gold-lt);letter-spacing:.4px;background:rgba(201,169,110,.06);}

/* prob slide animations */
.prob-slide .prob-badge{opacity:0;transform:translateY(16px);animation:none;}
.prob-slide .prob-vs-wrap{opacity:0;transform:translateY(20px);animation:none;}
.prob-slide .prob-fact{opacity:0;transform:translateY(16px);animation:none;}
.slide.active .prob-slide .prob-badge{animation:fadeUp .5s .2s forwards;}
.slide.active .prob-slide .prob-vs-wrap{animation:fadeUp .6s .4s forwards;}
.slide.active .prob-slide .prob-fact{animation:fadeUp .5s .9s forwards;}
</style>
</head>
<body>

<!-- LOGO BAR -->
<div id="logo-bar">
  <div class="logo">Euro<span>Con</span>Craft</div>
  <div class="bar-right">
    <div id="lang-toggle">
      <button class="lang-btn" data-lang="ru">RU</button>
      <button class="lang-btn active" data-lang="th">TH</button>
    </div>
    <div id="counter">1 / 16</div>
  </div>
</div>

<div id="progress"></div>

<div id="slideshow">

  <!-- 0: TITLE -->
  <div class="slide active" id="s0">
    <div class="wave"></div>
    <div class="bg-photo"></div>
    <div class="bg-glow"></div>
    <div class="eyebrow pre-anim au1" data-key="s0_eyebrow"></div>
    <h1 class="pre-anim au2" data-key="s0_h1"></h1>
    <p class="sub pre-anim au3" data-key="s0_sub"></p>
    <div class="g-line"></div>
  </div>

  <!-- 1: BIG STAT -->
  <div class="slide" id="s1">
    <div class="wave"></div>
    <div class="eyebrow pre-anim au1" data-key="s1_eyebrow"></div>
    <div class="num pre-pop pop1">25+</div>
    <div class="lbl pre-anim au2" data-key="s1_lbl"></div>
    <h2 class="pre-anim au3" data-key="s1_h2"></h2>
    <p class="pre-anim au4" data-key="s1_p"></p>
  </div>

  <!-- 2: COMPARISON -->
  <div class="slide" id="s2">
    <div class="wave"></div>
    <h2 class="pre-anim au1" data-key="s2_h2"></h2>
    <div class="cmp-wrap">
      <table class="cmp">
        <thead>
          <tr>
            <th style="text-align:left" data-key="s2_col0"></th>
            <th class="th-us" data-key="s2_col1"></th>
            <th data-key="s2_col2"></th>
            <th data-key="s2_col3"></th>
            <th data-key="s2_col4"></th>
          </tr>
        </thead>
        <tbody>
          <tr><td data-key="s2_r1"></td><td class="td-us"><span class="ic-y">✓</span></td><td><span class="ic-n">✗</span></td><td><span class="ic-p">~</span></td><td><span class="ic-y">✓</span></td></tr>
          <tr><td data-key="s2_r2"></td><td class="td-us"><span class="ic-y">✓</span></td><td><span class="ic-n">✗</span></td><td><span class="ic-n">✗</span></td><td><span class="ic-p">~</span></td></tr>
          <tr><td data-key="s2_r3"></td><td class="td-us"><span class="ic-y">✓</span></td><td><span class="ic-n">✗</span></td><td><span class="ic-n">✗</span></td><td><span class="ic-n">✗</span></td></tr>
          <tr><td data-key="s2_r4"></td><td class="td-us"><span class="ic-y">✓</span></td><td><span class="ic-n">✗</span></td><td><span class="ic-n">✗</span></td><td><span class="ic-n">✗</span></td></tr>
          <tr><td data-key="s2_r5"></td><td class="td-us"><span class="ic-y">✓</span></td><td><span class="ic-p">~</span></td><td><span class="ic-n">✗</span></td><td><span class="ic-n">✗</span></td></tr>
          <tr><td data-key="s2_r6"></td><td class="td-us"><span class="ic-y">✓</span></td><td><span class="ic-p">~</span></td><td><span class="ic-p">~</span></td><td><span class="ic-n">✗</span></td></tr>
          <tr><td data-key="s2_r7"></td><td class="td-us"><span class="ic-y">✓</span></td><td><span class="ic-y">✓</span></td><td><span class="ic-n">✗</span></td><td><span class="ic-n">✗</span></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- 3: 6 ADVANTAGES -->
  <div class="slide" id="s3">
    <div class="wave"></div>
    <h2 class="pre-anim au1" data-key="s3_h2"></h2>
    <div class="adv-grid">
      <div class="adv-card pre-anim au2"><div class="adv-icon">💧</div><div class="adv-title" data-key="s3_a1t"></div><div class="adv-desc" data-key="s3_a1d"></div></div>
      <div class="adv-card pre-anim au3"><div class="adv-icon">⚡</div><div class="adv-title" data-key="s3_a2t"></div><div class="adv-desc" data-key="s3_a2d"></div></div>
      <div class="adv-card pre-anim au4"><div class="adv-icon">🎨</div><div class="adv-title" data-key="s3_a3t"></div><div class="adv-desc" data-key="s3_a3d"></div></div>
      <div class="adv-card pre-anim au5"><div class="adv-icon">🔇</div><div class="adv-title" data-key="s3_a4t"></div><div class="adv-desc" data-key="s3_a4d"></div></div>
      <div class="adv-card pre-anim au6"><div class="adv-icon">🌡️</div><div class="adv-title" data-key="s3_a5t"></div><div class="adv-desc" data-key="s3_a5d"></div></div>
      <div class="adv-card pre-anim au7"><div class="adv-icon">🧹</div><div class="adv-title" data-key="s3_a6t"></div><div class="adv-desc" data-key="s3_a6d"></div></div>
    </div>
  </div>

  <!-- 4: TYPES -->
  <div class="slide" id="s4">
    <div class="wave"></div>
    <h2 class="pre-anim au1" data-key="s4_h2"></h2>
    <div class="types-grid">
      <div class="type-card tc-gloss pre-anim au2">
        <div class="tc-photo"></div>
        <div class="type-name" data-key="s4_t1n"></div>
        <div class="type-tag tag-g" data-key="s4_t1tag"></div>
        <div class="type-desc" data-key="s4_t1d"></div>
        <div class="type-feats">
          <div class="type-feat" data-key="s4_t1f1"></div>
          <div class="type-feat" data-key="s4_t1f2"></div>
          <div class="type-feat" data-key="s4_t1f3"></div>
        </div>
      </div>
      <div class="type-card tc-matte pre-anim au3">
        <div class="tc-photo"></div>
        <div class="type-name" data-key="s4_t2n"></div>
        <div class="type-tag tag-m" data-key="s4_t2tag"></div>
        <div class="type-desc" data-key="s4_t2d"></div>
        <div class="type-feats">
          <div class="type-feat" data-key="s4_t2f1"></div>
          <div class="type-feat" data-key="s4_t2f2"></div>
          <div class="type-feat" data-key="s4_t2f3"></div>
        </div>
      </div>
      <div class="type-card tc-satin pre-anim au4">
        <div class="tc-photo"></div>
        <div class="type-name" data-key="s4_t3n"></div>
        <div class="type-tag tag-s" data-key="s4_t3tag"></div>
        <div class="type-desc" data-key="s4_t3d"></div>
        <div class="type-feats">
          <div class="type-feat" data-key="s4_t3f1"></div>
          <div class="type-feat" data-key="s4_t3f2"></div>
          <div class="type-feat" data-key="s4_t3f3"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 5: LIFESPAN -->
  <div class="slide" id="s5">
    <div class="wave"></div>
    <h2 class="pre-anim au1" data-key="s5_h2"></h2>
    <div class="bars">
      <div class="bar-row"><div class="bar-name" data-key="s5_b1n"></div><div class="bar-track"><div class="bar-fill bf1"></div></div><div class="bar-val" style="color:var(--gold-lt)" data-key="s5_b1v"></div></div>
      <div class="bar-row"><div class="bar-name" data-key="s5_b2n"></div><div class="bar-track"><div class="bar-fill bf2"></div></div><div class="bar-val" data-key="s5_b2v"></div></div>
      <div class="bar-row"><div class="bar-name" data-key="s5_b3n"></div><div class="bar-track"><div class="bar-fill bf3"></div></div><div class="bar-val" data-key="s5_b3v"></div></div>
      <div class="bar-row"><div class="bar-name" data-key="s5_b4n"></div><div class="bar-track"><div class="bar-fill bf4"></div></div><div class="bar-val" data-key="s5_b4v"></div></div>
      <div class="bar-row"><div class="bar-name" data-key="s5_b5n"></div><div class="bar-track"><div class="bar-fill bf5"></div></div><div class="bar-val" data-key="s5_b5v"></div></div>
    </div>
    <div class="bar-note pre-anim au6" data-key="s5_note"></div>
  </div>

  <!-- 6: INSTALLATION -->
  <div class="slide" id="s6">
    <div class="wave"></div>
    <div class="bg-photo"></div>
    <h2 class="pre-anim au1" data-key="s6_h2"></h2>
    <div class="steps">
      <div class="step pre-anim au2"><div class="step-n">1</div><div class="step-t" data-key="s6_s1t"></div><div class="step-d" data-key="s6_s1d"></div></div>
      <div class="step pre-anim au3"><div class="step-n">2</div><div class="step-t" data-key="s6_s2t"></div><div class="step-d" data-key="s6_s2d"></div></div>
      <div class="step pre-anim au4"><div class="step-n">3</div><div class="step-t" data-key="s6_s3t"></div><div class="step-d" data-key="s6_s3d"></div></div>
      <div class="step pre-anim au5"><div class="step-n">4</div><div class="step-t" data-key="s6_s4t"></div><div class="step-d" data-key="s6_s4d"></div></div>
    </div>
    <div class="inst-fact pre-anim au6" data-key="s6_fact"></div>
  </div>

  <!-- 7: DUEL — натяжной vs гипсокартон -->
  <div class="slide" id="s7">
    <div class="wave"></div>
    <h2 class="pre-anim au1" data-key="s7_h2"></h2>
    <div class="duel-wrap pre-anim au2">
      <div class="duel-col duel-col-gkl">
        <div class="duel-header" data-key="s7_gkl_title"></div>
        <div class="duel-item"><span class="duel-icon">💦</span><span data-key="s7_gkl_1"></span></div>
        <div class="duel-item"><span class="duel-icon">🔨</span><span data-key="s7_gkl_2"></span></div>
        <div class="duel-item"><span class="duel-icon">🕰️</span><span data-key="s7_gkl_3"></span></div>
        <div class="duel-item has-svg">
          <svg class="duel-icon-svg" viewBox="0 0 24 16" xmlns="http://www.w3.org/2000/svg">
            <g fill="#E06C75">
              <ellipse cx="6" cy="8" rx="4" ry="3.2"/>
              <ellipse cx="12" cy="8" rx="3.5" ry="2.6"/>
              <circle cx="18" cy="8" r="3"/>
              <line x1="20.5" y1="6" x2="23" y2="3.5" stroke="#E06C75" stroke-width="1"/>
              <line x1="20.5" y1="10" x2="23" y2="12.5" stroke="#E06C75" stroke-width="1"/>
              <line x1="6" y1="11" x2="5" y2="14.5" stroke="#E06C75" stroke-width="1"/>
              <line x1="9" y1="11" x2="9.5" y2="14.5" stroke="#E06C75" stroke-width="1"/>
              <line x1="12" y1="10" x2="13" y2="14" stroke="#E06C75" stroke-width="1"/>
            </g>
          </svg>
          <span data-key="s7_gkl_4"></span>
        </div>
        <div class="duel-item"><span class="duel-icon">💸</span><span data-key="s7_gkl_5"></span></div>
      </div>
      <div class="duel-divider"><div class="duel-tick"></div><div class="duel-vs">VS</div><div class="duel-tick"></div></div>
      <div class="duel-col duel-col-nat">
        <div class="duel-header" data-key="s7_nat_title"></div>
        <div class="duel-item"><span class="duel-icon">✅</span><span data-key="s7_nat_1"></span></div>
        <div class="duel-item"><span class="duel-icon">✅</span><span data-key="s7_nat_2"></span></div>
        <div class="duel-item"><span class="duel-icon">✅</span><span data-key="s7_nat_3"></span></div>
        <div class="duel-item"><span class="duel-icon">✅</span><span data-key="s7_nat_4"></span></div>
        <div class="duel-item"><span class="duel-icon">✅</span><span data-key="s7_nat_5"></span></div>
      </div>
    </div>

    <!-- TERMITE WARNING BANNER -->
    <div class="termite-banner">
      <div class="termite-svg-wrap">
        <svg viewBox="0 0 80 50" xmlns="http://www.w3.org/2000/svg">
          <!-- gypsum board slice being eaten -->
          <rect x="2" y="6" width="14" height="38" rx="1.5" fill="#3a4060" opacity="0.5"/>
          <rect x="2" y="6" width="14" height="5" rx="1.5" fill="#E06C75" opacity="0.4"/>

          <circle cx="9" cy="18" r="2.2" fill="#0B0F1A"/>
          <circle cx="12" cy="26" r="1.6" fill="#0B0F1A"/>
          <circle cx="7" cy="32" r="1.9" fill="#0B0F1A"/>

          <g class="tm-body">
            <!-- antennae -->
            <line class="tm-antenna" x1="60" y1="22" x2="68" y2="16" stroke="#E0A0A8" stroke-width="1.4" stroke-linecap="round"/>
            <line class="tm-antenna" x1="60" y1="26" x2="68" y2="30" stroke="#E0A0A8" stroke-width="1.4" stroke-linecap="round"/>

            <circle cx="58" cy="24" r="6" fill="#E06C75"/>
            <!-- mandibles -->
            <path d="M64 21 L69 19 M64 27 L69 29" stroke="#C04550" stroke-width="1.4" stroke-linecap="round" fill="none"/>
            <!-- thorax -->
            <ellipse cx="47" cy="24" rx="8" ry="6" fill="#D85F69"/>
            <!-- abdomen -->
            <ellipse cx="32" cy="24" rx="12" ry="7.5" fill="#E8C98A"/>
            <!-- segment lines on abdomen -->
            <path d="M28 17.5 Q28 24 28 30.5 M35 17 Q35 24 35 31 M22 18.5 Q22 24 22 29.5" stroke="#C9A96E" stroke-width="0.8" fill="none" opacity="0.6"/>
            <!-- legs -->
            <g stroke="#C04550" stroke-width="1.4" stroke-linecap="round">
              <line class="tm-leg" x1="44" y1="29" x2="42" y2="36"/>
              <line class="tm-leg" x1="48" y1="29" x2="49" y2="36"/>
              <line class="tm-leg" x1="52" y1="29" x2="55" y2="35"/>
            </g>
          </g>
        </svg>
      </div>
      <div class="termite-text">
        <div class="termite-title" data-key="s7_termite_title"></div>
        <div class="termite-desc" data-key="s7_termite_desc"></div>
      </div>
    </div>
  </div>

  </div>

  <!-- 7b: FLOOD -->
  <div class="slide" id="s7b">
    <div class="wave"></div>
    <div class="prob-slide">
      <div class="prob-badge gkl-badge"><span data-key="p1_badge"></span></div>
      <div class="prob-vs-wrap">
        <div class="prob-side prob-bad">
          <div class="prob-icon-wrap">
            <svg viewBox="0 0 100 80" width="100" height="80">
              <!-- ceiling cracking and sagging -->
              <rect x="5" y="5" width="90" height="12" rx="2" fill="#3a4060" opacity="0.7"/>
              <!-- water droplets falling through -->
              <ellipse cx="25" cy="24" rx="3" ry="4" fill="#7EB8F7" opacity="0.8"/>
              <ellipse cx="50" cy="20" rx="2.5" ry="3.5" fill="#7EB8F7" opacity="0.9"/>
              <ellipse cx="75" cy="26" rx="3" ry="4.5" fill="#7EB8F7" opacity="0.8"/>
              <!-- GKL panel swelling and falling apart -->
              <rect x="8" y="30" width="38" height="20" rx="2" fill="#5a6080" transform="rotate(8,27,40)"/>
              <rect x="54" y="33" width="35" height="18" rx="2" fill="#5a6080" transform="rotate(-10,71,42)"/>
              <!-- rubble pieces falling -->
              <rect x="20" y="55" width="12" height="8" rx="1" fill="#4a5070" transform="rotate(15,26,59)"/>
              <rect x="60" y="58" width="10" height="7" rx="1" fill="#4a5070" transform="rotate(-20,65,61)"/>
              <!-- crack line across ceiling -->
              <path d="M5 11 L35 14 L50 10 L75 13 L95 11" stroke="#E06C75" stroke-width="1.5" fill="none" stroke-dasharray="3,2"/>
              <!-- water puddle on floor -->

              <!-- X mark -->
              <text x="50" y="78" text-anchor="middle" fill="#E06C75" font-size="9" font-weight="bold">✗ ГИПСОКАРТОН</text>
            </svg>
          </div>
          <div class="prob-label bad-label" data-key="p1_bad_label"></div>
          <ul class="prob-list bad-list">
            <li data-key="p1_bad_1"></li>
            <li data-key="p1_bad_2"></li>
            <li data-key="p1_bad_3"></li>
          </ul>
        </div>
        <div class="prob-divider">VS</div>
        <div class="prob-side prob-good">
          <div class="prob-icon-wrap">
            <svg viewBox="0 0 100 80" width="100" height="80">
              <!-- stretch ceiling fabric holding water -->
              <path d="M5 15 Q50 10 95 15 Q50 50 5 15Z" fill="#C9A96E" opacity="0.25"/>
              <path d="M5 15 Q50 10 95 15" stroke="#C9A96E" stroke-width="2.5" fill="none"/>
              <!-- water collected in the sag -->
              <path d="M15 17 Q50 48 85 17 Q50 52 15 17Z" fill="#7EB8F7" opacity="0.35"/>
              <!-- water being drained via valve -->
              <circle cx="50" cy="48" r="4" fill="#C9A96E" opacity="0.8"/>
              <line x1="50" y1="52" x2="50" y2="62" stroke="#7EB8F7" stroke-width="2" stroke-dasharray="2,2"/>
              <!-- tidy room below -->
              <rect x="10" y="64" width="80" height="4" rx="1" fill="#2a3060" opacity="0.5"/>
              <!-- checkmark -->
              <text x="50" y="78" text-anchor="middle" fill="#C9A96E" font-size="9" font-weight="bold">✓ НАТЯЖНОЙ</text>
            </svg>
          </div>
          <div class="prob-label good-label" data-key="p1_good_label"></div>
          <ul class="prob-list good-list">
            <li data-key="p1_good_1"></li>
            <li data-key="p1_good_2"></li>
            <li data-key="p1_good_3"></li>
          </ul>
        </div>
      </div>
      <div class="prob-fact pre-anim au5" data-key="p1_fact"></div>
    </div>
  </div>

  <!-- 7c: INSTALLATION TIME -->
  <div class="slide" id="s7c">
    <div class="wave"></div>
    <div class="prob-slide">
      <div class="prob-badge gkl-badge"><span data-key="p2_badge"></span></div>
      <div class="prob-vs-wrap">
        <div class="prob-side prob-bad">
          <div class="prob-icon-wrap">
            <svg viewBox="0 0 100 80" width="100" height="80">
              <!-- dusty mess -->

/* ════════════════════════════
   APPLY LANGUAGE
════════════════════════════ */
let lang = 'ru';

function applyLang(l) {
  lang = l;
  const d = T[l];
  document.body.classList.toggle('th', l === 'th');
  document.querySelectorAll('[data-key]').forEach(el => {
    const k = el.dataset.key;
    if (d[k] !== undefined) el.innerHTML = d[k];
  });
  // update auto button
  autoBtn.textContent = autoPlay ? d.ctrl_auto : d.ctrl_auto_paused;
  // update lang buttons
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === l);
  });
}

/* ════════════════════════════
   SLIDESHOW
════════════════════════════ */
const slides = Array.from(document.querySelectorAll('.slide'));
const dotsEl = document.getElementById('dots');
const progressEl = document.getElementById('progress');
const counterEl = document.getElementById('counter');
const autoBtn = document.getElementById('autoBtn');
const DURATION = 6500;
let cur = 0, autoPlay = true, pTimer = null;

slides.forEach((_, i) => {
  const d = document.createElement('div');
  d.className = 'dot' + (i===0?' active':'');
  d.addEventListener('click', () => goTo(i));
  dotsEl.appendChild(d);
});

function updateDots(i) {
  document.querySelectorAll('.dot').forEach((d,j)=>d.classList.toggle('active',j===i));
}
function goTo(idx) {
  slides[cur].classList.remove('active');
  cur = ((idx % slides.length) + slides.length) % slides.length;
  slides[cur].classList.add('active');
  updateDots(cur);
  counterEl.textContent = (cur+1) + ' / ' + slides.length;
  startProgress();
}
function startProgress() {
  progressEl.style.transition = 'none';
  progressEl.style.width = '0%';
  clearTimeout(pTimer);
  if (!autoPlay) return;
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    progressEl.style.transition = `width ${DURATION}ms linear`;
    progressEl.style.width = '100%';
  }));
  pTimer = setTimeout(()=>goTo(cur+1), DURATION);
}
function toggleAuto() {
  autoPlay = !autoPlay;
  autoBtn.textContent = autoPlay ? T[lang].ctrl_auto : T[lang].ctrl_auto_paused;
  autoBtn.classList.toggle('paused', !autoPlay);
  if (autoPlay) startProgress();
  else { clearTimeout(pTimer); progressEl.style.transition='none'; progressEl.style.width='0%'; }
}

document.getElementById('prevBtn').addEventListener('click',()=>{clearTimeout(pTimer);goTo(cur-1);});
document.getElementById('nextBtn').addEventListener('click',()=>{clearTimeout(pTimer);goTo(cur+1);});
autoBtn.addEventListener('click', toggleAuto);

document.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight'||e.key===' '){clearTimeout(pTimer);goTo(cur+1);}
  if(e.key==='ArrowLeft'){clearTimeout(pTimer);goTo(cur-1);}
  if(e.key==='p'||e.key==='P') toggleAuto();
});
let tx=0,ty=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx;
  const dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>45){clearTimeout(pTimer);goTo(cur+(dx<0?1:-1));}
},{passive:true});

// lang buttons
document.querySelectorAll('.lang-btn').forEach(b => {
  b.addEventListener('click', () => applyLang(b.dataset.lang));
});

// init
applyLang('th');
startProgress();
</script>
